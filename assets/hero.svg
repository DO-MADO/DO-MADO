<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ambient" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="0.55" stop-color="#05070b"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="titleIce" x1="180" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8f1ff"/>
      <stop offset="0.45" stop-color="#a8c7fa"/>
      <stop offset="0.75" stop-color="#dbe7f7"/>
      <stop offset="1" stop-color="#f5f5f7"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-140 0; 140 0; -140 0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ribbonSilver" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f5f7" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#c9d4e3" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#8fb5f0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f5f5f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbonBlue" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6aa5f8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6aa5f8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6aa5f8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbonFaint" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur6" x="-20%" y="-120%" width="140%" height="340%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur2" x="-20%" y="-120%" width="140%" height="340%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="420" rx="20" fill="url(#ambient)"/>
  <rect x="0.5" y="0.5" width="899" height="419" rx="19.5" stroke="#1a1d22"/>

  <!-- ── typography ── -->
  <g text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
    <text x="450" y="128" font-size="12" letter-spacing="4" fill="#86868b" opacity="0">
      WEB &amp; MOBILE FULLSTACK DEVELOPER
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="1.2s" fill="freeze"/>
    </text>

    <text x="450" y="188" font-size="42" font-weight="700" fill="url(#titleIce)" opacity="0">
      기능을 넘어, 흐름을 만듭니다.
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="1.4s" fill="freeze"/>
    </text>

    <text x="450" y="228" font-size="15.5" fill="#a1a1a6" opacity="0">
      요청부터 응답까지, 전체 연결을 설계합니다.
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="1.4s" fill="freeze"/>
    </text>

    <!-- pill chip -->
    <g opacity="0">
      <rect x="252" y="252" width="396" height="32" rx="16" fill="#111214" stroke="#26282c"/>
      <text x="450" y="272" font-size="12" fill="#86868b">Frontend&#160;&#160;·&#160;&#160;Mobile&#160;&#160;·&#160;&#160;Backend&#160;&#160;·&#160;&#160;Database&#160;&#160;·&#160;&#160;Infra</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="1.4s" fill="freeze"/>
    </g>
  </g>

  <!-- ── fluid ribbons ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="2s" fill="freeze"/>

    <!-- glow layer -->
    <path stroke="url(#ribbonBlue)" stroke-width="10" stroke-linecap="round" filter="url(#blur6)"
      d="M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350">
      <animate attributeName="d" dur="16s" repeatCount="indefinite"
        values="M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350;
                M-40 350 C160 384 300 318 450 354 C600 388 740 320 940 352;
                M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350"/>
    </path>

    <!-- silver main strand -->
    <path stroke="url(#ribbonSilver)" stroke-width="1.6" filter="url(#blur2)"
      d="M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350">
      <animate attributeName="d" dur="16s" repeatCount="indefinite"
        values="M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350;
                M-40 350 C160 384 300 318 450 354 C600 388 740 320 940 352;
                M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350"/>
    </path>

    <!-- companion strand -->
    <path stroke="url(#ribbonFaint)" stroke-width="1.2"
      d="M-40 366 C180 396 320 330 460 364 C610 398 750 334 940 366">
      <animate attributeName="d" dur="21s" repeatCount="indefinite"
        values="M-40 366 C180 396 320 330 460 364 C610 398 750 334 940 366;
                M-40 364 C180 334 320 398 460 362 C610 330 750 396 940 364;
                M-40 366 C180 396 320 330 460 364 C610 398 750 334 940 366"/>
    </path>

    <!-- upper faint strand -->
    <path stroke="url(#ribbonFaint)" stroke-width="1"
      d="M-40 338 C200 312 340 366 480 340 C630 314 760 364 940 336">
      <animate attributeName="d" dur="26s" repeatCount="indefinite"
        values="M-40 338 C200 312 340 366 480 340 C630 314 760 364 940 336;
                M-40 336 C200 362 340 310 480 342 C630 368 760 312 940 338;
                M-40 338 C200 312 340 366 480 340 C630 314 760 364 940 336"/>
    </path>

    <!-- traveling light -->
    <circle r="2.2" fill="#dbe7f7" opacity="0.9" filter="url(#blur2)">
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M-40 352 C160 322 300 386 450 352 C600 318 740 384 940 350"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- signature -->
  <text x="852" y="398" text-anchor="end" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10.5" fill="#3a3a3c" opacity="0">
    박건호 — Fullstack Developer
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="1.5s" fill="freeze"/>
  </text>
</svg>
