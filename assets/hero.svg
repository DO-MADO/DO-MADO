<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="neutralVignette" cx="0.5" cy="0.38" r="0.78">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="0.58" stop-color="#030303"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="titleApple" x1="178" y1="0" x2="722" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0"/>
      <stop offset="0.31" stop-color="#9dcfca"/>
      <stop offset="0.68" stop-color="#6b95ac"/>
      <stop offset="1" stop-color="#45657d"/>
    </linearGradient>
    <linearGradient id="ribbonApple" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0" stop-opacity="0"/>
      <stop offset="0.31" stop-color="#9dcfca" stop-opacity="0.5"/>
      <stop offset="0.68" stop-color="#6b95ac" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#45657d" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-500 0; 500 0; -500 0" dur="13s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="blur6" x="-20%" y="-160%" width="140%" height="420%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="blur2" x="-20%" y="-120%" width="140%" height="340%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="420" rx="20" fill="url(#neutralVignette)"/>
  <rect x="0.5" y="0.5" width="899" height="419" rx="19.5" stroke="#1a1d22"/>

  <!-- ── typography ── -->
  <g text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
    <text x="450" y="128" font-size="12" letter-spacing="4" fill="#86868b" opacity="0">
      WEB &amp; MOBILE FULLSTACK DEVELOPER
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="1.2s" fill="freeze"/>
    </text>

    <text x="450" y="188" font-size="42" font-weight="700" fill="url(#titleApple)" opacity="0">
      기능을 넘어, 흐름을 만듭니다.
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="1.4s" fill="freeze"/>
    </text>

    <text x="450" y="228" font-size="15.5" fill="#a1a1a6" opacity="0">
      요청부터 응답까지, 전체 연결을 설계합니다.
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="1.4s" fill="freeze"/>
    </text>

    <!-- pill chip -->
    <g opacity="0">
      <rect x="270" y="252" width="360" height="32" rx="16" fill="#111214" stroke="#26282c"/>
      <text x="450" y="272" font-size="12" fill="#86868b">Frontend&#160;&#160;·&#160;&#160;Mobile&#160;&#160;·&#160;&#160;Backend&#160;&#160;·&#160;&#160;Database&#160;&#160;·&#160;&#160;Infra</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="1.4s" fill="freeze"/>
    </g>
  </g>

  <!-- ── fluid ribbons ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="2s" fill="freeze"/>

    <!-- core band -->
    <path stroke="url(#ribbonApple)" stroke-width="3" stroke-linecap="round" filter="url(#blur2)"
      d="M-40 352 C90 314 192 314 296 350 C394 384 506 386 606 348 C716 306 812 310 940 354">
      <animate attributeName="d" dur="16s" repeatCount="indefinite"
        values="M-40 352 C90 314 192 314 296 350 C394 384 506 386 606 348 C716 306 812 310 940 354;
                M-40 350 C96 392 198 390 298 352 C396 314 506 310 606 350 C712 392 816 390 940 348;
                M-40 352 C90 314 192 314 296 350 C394 384 506 386 606 348 C716 306 812 310 940 354"/>
    </path>

  </g>

  <!-- signature -->
  <text x="852" y="398" text-anchor="end" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="10.5" fill="#3a3a3c" opacity="0">
    박건호 — Fullstack Developer
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="1.5s" fill="freeze"/>
  </text>
</svg>
