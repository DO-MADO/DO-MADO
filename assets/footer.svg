<svg width="900" height="130" viewBox="0 0 900 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fAmbient" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#0a0e15"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="fStrand" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0" stop-opacity="0"/>
      <stop offset="0.31" stop-color="#9dcfca" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#e4f6f0" stop-opacity="0.76"/>
      <stop offset="0.68" stop-color="#6b95ac" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#45657d" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-500 0; 500 0; -500 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="fApple" x1="330" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0"/>
      <stop offset="0.31" stop-color="#9dcfca"/>
      <stop offset="0.68" stop-color="#6b95ac"/>
      <stop offset="1" stop-color="#45657d"/>
    </linearGradient>
    <filter id="fBlur" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <rect width="900" height="130" rx="20" fill="url(#fAmbient)"/>
  <rect x="0.5" y="0.5" width="899" height="129" rx="19.5" stroke="#1a1d22"/>

  <!-- fluid strand -->
  <path stroke="url(#fStrand)" stroke-width="2.4" stroke-linecap="round" filter="url(#fBlur)"
    d="M-40 42 C96 8 196 10 300 44 C400 76 512 74 610 42 C720 6 816 10 940 46">
    <animate attributeName="d" dur="18s" repeatCount="indefinite"
      values="M-40 42 C96 8 196 10 300 44 C400 76 512 74 610 42 C720 6 816 10 940 46;
              M-40 44 C100 76 202 74 302 42 C400 8 512 6 610 44 C718 76 818 74 940 40;
              M-40 42 C96 8 196 10 300 44 C400 76 512 74 610 42 C720 6 816 10 940 46"/>
  </path>
  <text x="450" y="86" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif" font-size="16.5" font-weight="600" fill="url(#fApple)">좋은 흐름은, 함께 만들어집니다.</text>
  <text x="450" y="108" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="#48484a">Thanks for reading — hope to see you again soon</text>
</svg>
