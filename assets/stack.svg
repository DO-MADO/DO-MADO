<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sAmbient" cx="0.5" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#0a0e15"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="sRail" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#9dcfca" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#e4f6f0" stop-opacity="0.6"/>
      <stop offset="0.65" stop-color="#6b95ac" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#45657d" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-500 0; 500 0; -500 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e4f6f0"/>
      <stop offset="0.31" stop-color="#9dcfca"/>
      <stop offset="0.68" stop-color="#6b95ac"/>
      <stop offset="1" stop-color="#45657d"/>
    </linearGradient>
    <filter id="sBlur" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <rect width="900" height="300" rx="20" fill="url(#sAmbient)"/>
  <rect x="0.5" y="0.5" width="899" height="299" rx="19.5" stroke="#1a1d22"/>

  <!-- caption -->
  <text x="450" y="42" text-anchor="middle" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif" font-size="12.5" letter-spacing="1" fill="#86868b">요청부터 응답까지, 하나의 흐름으로</text>

  <!-- flow rail (fluid curve) -->
  <path d="M60 76 C260 70 640 82 840 76" stroke="url(#sRail)" stroke-width="1.2">
    <animate attributeName="d" dur="14s" repeatCount="indefinite"
      values="M60 76 C260 70 640 82 840 76;
              M60 76 C260 82 640 70 840 76;
              M60 76 C260 70 640 82 840 76"/>
  </path>
  <circle cx="143" cy="76" r="1.8" fill="#e4f6f0" opacity="0.55"/>
  <circle cx="348" cy="76" r="1.8" fill="#9dcfca" opacity="0.55"/>
  <circle cx="553" cy="76" r="1.8" fill="#6b95ac" opacity="0.55"/>
  <circle cx="758" cy="76" r="1.8" fill="#45657d" opacity="0.55"/>

  <!-- column hairlines -->
  <path d="M245 106 V206 M450 106 V206 M655 106 V206" stroke="#15181d"/>

  <g font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif" text-anchor="middle">
    <!-- CLIENT -->
    <text x="143" y="110" font-size="11" letter-spacing="3" fill="url(#appleGrad)">CLIENT</text>
    <text x="143" y="146" font-size="14.5" fill="#f5f5f7">React</text>
    <text x="143" y="172" font-size="14.5" fill="#f5f5f7">Flutter</text>
    <text x="143" y="198" font-size="12.5" fill="#48484a">TailwindCSS · Vite</text>

    <!-- SERVER -->
    <text x="348" y="110" font-size="11" letter-spacing="3" fill="url(#appleGrad)">SERVER</text>
    <text x="348" y="146" font-size="14.5" fill="#f5f5f7">NestJS · FastAPI</text>
    <text x="348" y="172" font-size="14.5" fill="#f5f5f7">Express</text>
    <text x="348" y="198" font-size="12.5" fill="#48484a">WebSocket · Pydantic</text>

    <!-- DATA -->
    <text x="553" y="110" font-size="11" letter-spacing="3" fill="url(#appleGrad)">DATA</text>
    <text x="553" y="146" font-size="14.5" fill="#f5f5f7">MySQL</text>
    <text x="553" y="172" font-size="14.5" fill="#f5f5f7">MariaDB</text>
    <text x="553" y="198" font-size="12.5" fill="#48484a">Oracle · Supabase</text>

    <!-- INFRA · OPS -->
    <text x="758" y="110" font-size="11" letter-spacing="3" fill="url(#appleGrad)">INFRA · OPS</text>
    <text x="758" y="146" font-size="14.5" fill="#f5f5f7">Ubuntu · Nginx · PM2</text>
    <text x="758" y="172" font-size="14.5" fill="#f5f5f7">Docker · GitHub Actions</text>
    <text x="758" y="198" font-size="12.5" fill="#48484a">Certbot · Falco · Netdata</text>

    <!-- bottom band -->
    <path d="M60 228 H840" stroke="#15181d"/>
    <text x="270" y="262" font-size="13">
      <tspan fill="#9dcfca" letter-spacing="2" font-size="11">AI</tspan>
      <tspan fill="#a1a1a6" dx="10">Claude · Codex · Gemini</tspan>
    </text>
    <text x="630" y="262" font-size="13">
      <tspan fill="#6b95ac" letter-spacing="2" font-size="11">LANGUAGES</tspan>
      <tspan fill="#a1a1a6" dx="10">Python · JavaScript / TypeScript</tspan>
    </text>
  </g>
</svg>
