<svg width="900" height="312" viewBox="0 0 900 312" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090c10"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect width="900" height="312" rx="14" fill="url(#tbg)"/>
  <rect x="0.5" y="0.5" width="899" height="311" rx="13.5" stroke="#30363d"/>

  <!-- title bar -->
  <path d="M0 14 A14 14 0 0 1 14 0 H886 A14 14 0 0 1 900 14 V38 H0 Z" fill="#161b22"/>
  <path d="M0 38 H900" stroke="#30363d"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="64" cy="19" r="6" fill="#28c840"/>
  <text x="450" y="24" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="12" fill="#8b949e">domado@on-premise: ~/service — tmux</text>

  <!-- terminal lines (14s loop) -->
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="13.5">
    <text x="28" y="70" opacity="0">
      <tspan fill="#7ee787">$</tspan><tspan fill="#e6edf3"> ./deploy.sh --target web</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.039;0.043;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="96" opacity="0">
      <tspan fill="#3fb950">  ✔</tspan><tspan fill="#8b949e"> pull → build → nginx reload → pm2 restart</tspan><tspan fill="#3d444d">  (42s, zero-downtime)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.139;0.143;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="126" opacity="0">
      <tspan fill="#7ee787">$</tspan><tspan fill="#e6edf3"> curl -I https://service.internal.kr</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.239;0.243;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="152" opacity="0">
      <tspan fill="#58a6ff">  HTTP/2 200</tspan><tspan fill="#8b949e"> · TLS(certbot) · nginx → pm2(express)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.339;0.343;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="182" opacity="0">
      <tspan fill="#7ee787">$</tspan><tspan fill="#e6edf3"> systemctl status stream.service</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.439;0.443;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="208" opacity="0">
      <tspan fill="#3fb950">  ● active (running)</tspan><tspan fill="#8b949e"> · C engine → FastAPI → WebSocket broadcast</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.539;0.543;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="238" opacity="0">
      <tspan fill="#7ee787">$</tspan><tspan fill="#e6edf3"> tail -f ws.log</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.639;0.643;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="28" y="264" opacity="0">
      <tspan fill="#8b949e">  [ws] 8ch streaming · </tspan><tspan fill="#58a6ff">349.8 kS/s/ch</tspan><tspan fill="#8b949e"> · </tspan><tspan fill="#3fb950">▂▃▅▇▆ live</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.739;0.743;0.943;0.971;1" dur="14s" repeatCount="indefinite"/>
    </text>

    <!-- prompt + cursor -->
    <text x="28" y="292" fill="#7ee787">$</text>
    <rect x="44" y="280" width="9" height="16" fill="#7ee787">
      <animate attributeName="opacity" values="1;0" calcMode="discrete" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
